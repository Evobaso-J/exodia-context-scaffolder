# Worked example: monorepo with the canonical 5 modules under `docs/project/`,
# glossary relocated to a sibling handbook, and a custom `mobile/` category.
#
# Drop this file at the root of your repo BEFORE the first `/exodia` run, then
# delete it (or .gitignore it) once the scaffolded tree is committed. The
# router table inside the emitted `AGENTS.md` becomes the sole persistent
# source of truth on re-runs.
#
# Full schema, validation rules, and path semantics: ../docs/config.md

context_dir: docs/project          # default root for canonical categories without explicit `path`
categories:
  glossary:
    path: docs/handbook/glossary   # canonical category relocated outside `context_dir`
  debugging: { drop: true }        # not needed for this repo
  mobile:                          # custom category (name not in the canonical set)
    path: docs/mobile
    custom: true
    description: "iOS / Android client quirks, device-specific footguns, release-train cadence"
    l3:
      - device_quirks.jsonl
      - release_train.yaml
