name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test-check-dist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.2

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Verify dist is up to date
        run: |
          if ! git diff --quiet -- dist; then
            echo "::error::dist/ is out of sync with src/. Run 'pnpm build' locally and commit the result."
            git diff -- dist
            exit 1
          fi

      - name: Test
        run: pnpm test
